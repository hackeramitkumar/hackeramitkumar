<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="280" viewBox="0 0 1000 280" fill="none" role="img" aria-label="Internet of Agents network">
  <defs>
    <linearGradient id="nbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0e1424"/>
    </linearGradient>
    <radialGradient id="ncore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </radialGradient>
    <filter id="nglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <path id="e1" d="M500,140 L200,66"/>
    <path id="e2" d="M500,140 L200,214"/>
    <path id="e3" d="M500,140 L500,44"/>
    <path id="e4" d="M500,140 L800,66"/>
    <path id="e5" d="M500,140 L800,214"/>
    <path id="e6" d="M500,140 L500,236"/>
  </defs>

  <rect width="1000" height="280" rx="18" fill="url(#nbg)" stroke="#1c2437"/>

  <text x="30" y="40" font-family="Fira Code, monospace" font-weight="700" font-size="18" fill="#e6edf3">&#129302; Internet of Agents</text>
  <text x="30" y="62" font-family="Fira Code, monospace" font-size="13" fill="#6e7681">agents negotiating over the A2A protocol</text>

  <g stroke="#2b3245" stroke-width="1.5">
    <use xlink:href="#e1"/><use xlink:href="#e2"/><use xlink:href="#e3"/>
    <use xlink:href="#e4"/><use xlink:href="#e5"/><use xlink:href="#e6"/>
  </g>

  <g fill="#00e5ff">
    <circle r="3.5"><animateMotion dur="2.4s" repeatCount="indefinite"><mpath xlink:href="#e1"/></animateMotion></circle>
    <circle r="3.5" fill="#7c4dff"><animateMotion dur="2.8s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear"><mpath xlink:href="#e2"/></animateMotion></circle>
    <circle r="3.5"><animateMotion dur="2.0s" repeatCount="indefinite"><mpath xlink:href="#e3"/></animateMotion></circle>
    <circle r="3.5" fill="#3fb950"><animateMotion dur="3.0s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear"><mpath xlink:href="#e4"/></animateMotion></circle>
    <circle r="3.5"><animateMotion dur="2.6s" repeatCount="indefinite"><mpath xlink:href="#e5"/></animateMotion></circle>
    <circle r="3.5" fill="#7c4dff"><animateMotion dur="2.2s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear"><mpath xlink:href="#e6"/></animateMotion></circle>
  </g>

  <g font-family="Fira Code, monospace" font-size="11" fill="#c9d1d9" text-anchor="middle">
    <g><circle cx="200" cy="66"  r="16" fill="#0b0f19" stroke="#00e5ff" stroke-width="1.5"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle><text x="200" y="70">A2A</text></g>
    <g><circle cx="200" cy="214" r="16" fill="#0b0f19" stroke="#7c4dff" stroke-width="1.5"><animate attributeName="stroke-opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/></circle><text x="200" y="218">gRPC</text></g>
    <g><circle cx="500" cy="44"  r="16" fill="#0b0f19" stroke="#00e5ff" stroke-width="1.5"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/></circle><text x="500" y="48">LLM</text></g>
    <g><circle cx="800" cy="66"  r="16" fill="#0b0f19" stroke="#3fb950" stroke-width="1.5"><animate attributeName="stroke-opacity" values="1;0.4;1" dur="4s" repeatCount="indefinite"/></circle><text x="800" y="70">Agent</text></g>
    <g><circle cx="800" cy="214" r="16" fill="#0b0f19" stroke="#00e5ff" stroke-width="1.5"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle><text x="800" y="218">Tool</text></g>
    <g><circle cx="500" cy="236" r="16" fill="#0b0f19" stroke="#7c4dff" stroke-width="1.5"><animate attributeName="stroke-opacity" values="1;0.4;1" dur="3.5s" repeatCount="indefinite"/></circle><text x="500" y="240">Memory</text></g>
  </g>

  <circle cx="500" cy="140" r="26" fill="url(#ncore)" filter="url(#nglow)">
    <animate attributeName="r" values="23;29;23" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="500" y="145" text-anchor="middle" font-family="Fira Code, monospace" font-weight="700" font-size="13" fill="#0b0f19">CORE</text>
</svg>
