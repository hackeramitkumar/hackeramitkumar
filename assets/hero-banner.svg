<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320" fill="none" role="img" aria-label="Amit Kumar - Systems Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0a1a2f;#12082b;#0d1117" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#161b22">
        <animate attributeName="stop-color" values="#161b22;#0b2540;#1b0b3a;#161b22" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="textGrad" gradientUnits="userSpaceOnUse" x1="70" y1="0" x2="600" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#e9d5ff">
        <animate attributeName="offset" values="0.15;0.85;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="320" rx="20" fill="url(#bg)"/>
  <rect width="1000" height="320" rx="20" fill="url(#glow)">
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
  </rect>

  <g stroke="#00e5ff" stroke-width="1.5">
    <line x1="820" y1="90" x2="900" y2="150" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/></line>
    <line x1="900" y1="150" x2="830" y2="230" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/></line>
    <line x1="830" y1="230" x2="750" y2="160" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.1;0.6;0.1" dur="5s" repeatCount="indefinite"/></line>
    <line x1="750" y1="160" x2="820" y2="90" stroke-opacity="0.3"><animate attributeName="stroke-opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/></line>
  </g>
  <g fill="#7c4dff" filter="url(#soft)">
    <circle cx="820" cy="90" r="6"><animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="150" r="6" fill="#00e5ff"><animate attributeName="r" values="8;5;8" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="230" r="6"><animate attributeName="r" values="5;9;5" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="160" r="6" fill="#00e5ff"><animate attributeName="r" values="9;5;9" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <g fill="#58a6ff">
    <circle cx="120" cy="60" r="2.5" opacity="0.7"><animate attributeName="cy" values="60;40;60" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="260" r="2" opacity="0.6"><animate attributeName="cy" values="260;280;260" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="180" r="2" opacity="0.5"><animate attributeName="cy" values="180;150;180" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="285" r="2.2" opacity="0.6"><animate attributeName="cy" values="285;265;285" dur="6.5s" repeatCount="indefinite"/></circle>
  </g>

  <g>
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" fill="freeze"/>
    <text x="70" y="130" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="800" font-size="58" letter-spacing="1" fill="url(#textGrad)" filter="url(#soft)">Amit Kumar</text>
    <text x="72" y="172" font-family="Fira Code, Consolas, monospace" font-weight="600" font-size="22" fill="#8b949e">Systems Engineer &#183; Cloud-Native &#183; Security</text>
    <text x="72" y="235" font-family="Fira Code, Consolas, monospace" font-weight="500" font-size="15" fill="#58a6ff">$ building { Rust &#183; Go &#183; C/C++ &#183; Kubernetes &#183; AI Agents }</text>
    <rect x="72" y="188" width="0" height="3" rx="1.5" fill="url(#textGrad)">
      <animate attributeName="width" from="0" to="430" dur="1.4s" begin="0.4s" fill="freeze"/>
    </rect>
  </g>

  <rect x="600" y="221" width="10" height="18" fill="#00e5ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
